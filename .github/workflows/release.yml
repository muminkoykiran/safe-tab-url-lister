name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build extension zip
        run: |
          zip -r safe-tab-url-lister-${{ github.ref_name }}.zip . \
            --exclude "*.DS_Store" \
            --exclude "*.zip" \
            --exclude "generate-icons.js" \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude ".playwright-mcp/*" \
            --exclude "node_modules/*" \
            --exclude "docs/*" \
            --exclude "CONTRIBUTING.md" \
            --exclude "CHANGELOG.md" \
            --exclude "LICENSE" \
            --exclude "README.md"

      - name: Extract changelog entry
        id: changelog
        run: |
          awk '/^## \[${{ steps.version.outputs.VERSION }}\]/{flag=1; next} /^## \[/{flag=0} flag' CHANGELOG.md > release_notes.md
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          cat release_notes.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Safe Tab URL Lister ${{ github.ref_name }}
          body_path: release_notes.md
          files: safe-tab-url-lister-${{ github.ref_name }}.zip
          draft: false
          prerelease: false
